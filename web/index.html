<!DOCTYPE html>
<html>

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">

  <!-- Twitter -->

  <meta property="twitter:description" content="Find the best AI tools for coding, image generation, video production, and writing. The most comprehensive AI directory updated daily.">

  <!-- Structured Data (JSON-LD) -->

    "description": "Find the best AI tools for coding, image generation, video production, and writing.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://www.aiworkx.space/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- Organization Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",

    "description": "The most comprehensive AI tool directory updated daily",
    "sameAs": [
      "https://twitter.com/aiworkx",
      "https://github.com/jugalbrahma"
    ]
  }
  </script>

  <!-- BreadcrumbList Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",

  <script type="application/ld+json">

    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",

  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AI Tools Hub">

  <title>AI Tools Hub — The Ultimate AI Tool Directory</title>
  <link rel="manifest" href="manifest.json">
