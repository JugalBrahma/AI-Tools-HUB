name: Build & Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "N8N_ASSISTANT_WEBHOOK_URL=${{ secrets.N8N_ASSISTANT_WEBHOOK_URL }}" > .env
          echo "N8N_PAYMENT_WEBHOOK_URL=${{ secrets.N8N_PAYMENT_WEBHOOK_URL }}" >> .env
          echo "N8N_API_KEY=${{ secrets.N8N_API_KEY }}" >> .env

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release --wasm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Prepare Vercel Deploy
        run: |
          mkdir -p .vercel
          echo '{"orgId":"${{ secrets.VERCEL_ORG_ID }}","projectId":"${{ secrets.VERCEL_PROJECT_ID }}"}' > .vercel/project.json
          cp ../../vercel.json ./vercel.json
        working-directory: ./build/web

      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        working-directory: ./build/web
